<div class="min-h-dvh bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 pb-20 md:pb-0 md:pl-64 transition-colors">
  <aside class="hidden md:flex md:flex-col md:fixed md:inset-y-0 md:left-0 md:w-64 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 p-6">
    <div class="flex items-center gap-3 mb-8">
      <div class="h-10 w-10 rounded-2xl bg-primary-600 text-white grid place-items-center font-semibold">LC</div>
      <div>
        <p class="text-sm font-semibold">LaCaleta</p>
        <p class="text-xs text-slate-500 dark:text-slate-400 truncate max-w-[9rem]">{{ user()?.email }}</p>
      </div>
    </div>

    <nav class="flex flex-col gap-1 text-sm">
      <a routerLink="/dashboard" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Dashboard</a>
      <a routerLink="/transactions" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Transacciones</a>
      <a routerLink="/accounts" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Cuentas</a>
      <a routerLink="/pockets" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Bolsillos</a>
      <a routerLink="/categories" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Categorías</a>
      <a routerLink="/reports" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Reportes</a>
      <a routerLink="/settings" routerLinkActive="bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300" class="px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Configuración</a>
    </nav>

    <button (click)="logout()" class="mt-auto text-left text-sm text-slate-500 dark:text-slate-400 hover:text-rose-600 px-3 py-2">
      Cerrar sesión
    </button>
  </aside>

  <main class="max-w-3xl mx-auto px-4 py-6 md:py-10">
    <router-outlet />
  </main>

  <nav class="md:hidden fixed bottom-0 inset-x-0 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 grid grid-cols-5 text-[11px] font-medium text-slate-500 dark:text-slate-400">
    <a routerLink="/dashboard" routerLinkActive="text-primary-600 dark:text-primary-400" class="py-3 text-center">Inicio</a>
    <a routerLink="/transactions" routerLinkActive="text-primary-600 dark:text-primary-400" class="py-3 text-center">Movs</a>
    <a routerLink="/transactions/new" routerLinkActive="text-primary-600 dark:text-primary-400" class="py-3 text-center">
      <span class="inline-grid place-items-center h-10 w-10 -mt-5 rounded-full bg-primary-600 text-white text-xl font-bold shadow-lg">+</span>
    </a>
    <a routerLink="/pockets" routerLinkActive="text-primary-600 dark:text-primary-400" class="py-3 text-center">Ahorro</a>
    <a routerLink="/settings" routerLinkActive="text-primary-600 dark:text-primary-400" class="py-3 text-center">Ajustes</a>
  </nav>
</div>
