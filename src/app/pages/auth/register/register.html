<section class="min-h-dvh flex flex-col justify-center px-6 py-10 bg-slate-50 dark:bg-slate-950">
  <div class="w-full max-w-sm mx-auto">
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-primary-600 text-white text-2xl font-semibold mb-4">LC</div>
      <h1 class="text-2xl font-semibold text-slate-900 dark:text-slate-100">Crea tu cuenta</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Empieza a controlar tu dinero.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm ring-1 ring-slate-100 dark:ring-slate-800">
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Nombre</label>
        <input
          type="text"
          autocomplete="name"
          formControlName="name"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Correo</label>
        <input
          type="email"
          autocomplete="email"
          formControlName="email"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Contraseña</label>
        <input
          type="password"
          autocomplete="new-password"
          formControlName="password"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>

      @if (error()) {
        <p class="text-xs text-rose-600 bg-rose-50 dark:bg-rose-950/40 rounded-lg px-3 py-2">{{ error() }}</p>
      }
      @if (info()) {
        <p class="text-xs text-primary-700 dark:text-primary-300 bg-primary-50 dark:bg-primary-900/40 rounded-lg px-3 py-2">{{ info() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full h-11 rounded-xl bg-primary-600 text-white text-sm font-medium hover:bg-primary-700 disabled:opacity-60 transition">
        {{ loading() ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-primary-600 dark:text-primary-400 font-medium">Inicia sesión</a>
    </p>
  </div>
</section>
