<section
  class="min-h-dvh relative overflow-hidden flex flex-col justify-center px-6 py-10 bg-slate-50 dark:bg-slate-950">
  <div aria-hidden="true"
    class="pointer-events-none absolute -top-32 -right-24 h-80 w-80 rounded-full bg-primary-400/30 dark:bg-primary-600/20 blur-3xl">
  </div>
  <div aria-hidden="true"
    class="pointer-events-none absolute -bottom-40 -left-20 h-96 w-96 rounded-full bg-primary-500/20 dark:bg-primary-500/15 blur-3xl">
  </div>

  <div class="relative w-full max-w-sm mx-auto">
    <div class="text-center mb-6">
      <img src="Logo.png" alt="La Caleta" class="mx-auto h-16 w-16 object-contain drop-shadow-sm mb-3" />
      <h1 class="text-2xl font-semibold text-slate-900 dark:text-slate-100">Crea tu cuenta</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Empieza a controlar tu dinero.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()"
      class="space-y-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur rounded-3xl p-6 shadow-xl ring-1 ring-slate-100 dark:ring-slate-800">
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Nombre</label>
        <input type="text" autocomplete="name" formControlName="name"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Correo</label>
        <input type="email" autocomplete="email" formControlName="email"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Contraseña</label>
        <input type="password" autocomplete="new-password" formControlName="password"
          class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-100 dark:focus:ring-primary-900/40" />
      </div>

      @if (error()) {
      <p class="text-xs text-rose-600 bg-rose-50 dark:bg-rose-950/40 rounded-lg px-3 py-2">{{ error() }}</p>
      }
      @if (info()) {
      <p
        class="text-xs text-primary-700 dark:text-primary-300 bg-primary-50 dark:bg-primary-900/40 rounded-lg px-3 py-2">
        {{ info() }}</p>
      }

      <button type="submit" [disabled]="loading()"
        class="w-full h-11 rounded-xl bg-primary-600 text-white text-sm font-semibold shadow-lg shadow-primary-600/30 hover:bg-primary-700 hover:shadow-primary-600/40 disabled:opacity-60 transition">
        {{ loading() ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-primary-600 dark:text-primary-400 font-semibold">Inicia sesión</a>
    </p>
  </div>
</section>
