<section class="min-h-dvh flex flex-col justify-center px-6 py-10 bg-slate-50">
  <div class="w-full max-w-sm mx-auto">
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-600 text-white text-2xl font-semibold mb-4">LC</div>
      <h1 class="text-2xl font-semibold text-slate-900">LaCaleta</h1>
      <p class="text-sm text-slate-500 mt-1">Tu dinero, bajo control.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 bg-white rounded-2xl p-6 shadow-sm ring-1 ring-slate-100">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Correo</label>
        <input
          type="email"
          autocomplete="email"
          formControlName="email"
          class="w-full h-11 rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none focus:border-emerald-500 focus:bg-white focus:ring-2 focus:ring-emerald-100"
          placeholder="tu@correo.com" />
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Contraseña</label>
        <input
          type="password"
          autocomplete="current-password"
          formControlName="password"
          class="w-full h-11 rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none focus:border-emerald-500 focus:bg-white focus:ring-2 focus:ring-emerald-100"
          placeholder="••••••••" />
      </div>

      @if (error()) {
        <p class="text-xs text-rose-600 bg-rose-50 rounded-lg px-3 py-2">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full h-11 rounded-xl bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700 disabled:opacity-60 transition">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      ¿Sin cuenta?
      <a routerLink="/register" class="text-emerald-600 font-medium">Regístrate</a>
    </p>
  </div>
</section>
