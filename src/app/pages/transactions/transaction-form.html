<header class="flex items-center gap-3 mb-5">
  <a routerLink="/transactions" class="text-slate-500 dark:text-slate-400 text-sm">←</a>
  <h1 class="text-2xl font-semibold">{{ id() ? 'Editar' : 'Nueva transacción' }}</h1>
</header>

<form [formGroup]="form" (ngSubmit)="submit()" class="bg-white dark:bg-slate-900 ring-1 ring-slate-100 dark:ring-slate-800 rounded-2xl p-5 space-y-4">
  <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
    <button type="button"
            (click)="setType('expense')"
            [class]="form.controls.type.value === 'expense' ? 'bg-rose-600 text-white shadow' : 'text-slate-500 dark:text-slate-400'"
            class="h-10 rounded-lg text-sm font-medium transition">
      Gasto
    </button>
    <button type="button"
            (click)="setType('income')"
            [class]="form.controls.type.value === 'income' ? 'bg-primary-600 text-white shadow' : 'text-slate-500 dark:text-slate-400'"
            class="h-10 rounded-lg text-sm font-medium transition">
      Ingreso
    </button>
  </div>

  <div>
    <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Monto</label>
    <input type="number" step="0.01" formControlName="amount"
      class="w-full h-12 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-2xl font-semibold outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-900" />
  </div>

  <div>
    <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">
      {{ currentType() === 'expense' ? 'Fuente (se descuenta de)' : 'Cuenta (se abona a)' }}
    </label>
    <select formControlName="account_id"
      class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 text-sm">
      @for (a of accounts(); track a.id) {
        <option [value]="a.id">{{ a.name }} — {{ a.balance | money }}</option>
      }
    </select>
    @if (currentType() === 'expense' && selectedAccount(); as acc) {
      <p class="text-xs mt-1"
         [class]="overBalance() ? 'text-rose-600' : 'text-slate-500 dark:text-slate-400'">
        Disponible: {{ acc.balance | money }}
        @if (overBalance()) { · excede el saldo }
      </p>
    }
  </div>

  <div>
    <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Categoría</label>
    <select formControlName="category_id"
      class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 text-sm">
      <option value="">Sin categoría</option>
      @for (c of categories(); track c.id) {
        <option [value]="c.id">{{ c.name }}</option>
      }
    </select>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Fecha</label>
      <input type="date" formControlName="date"
        class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 text-sm" />
    </div>
  </div>

  <div>
    <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Descripción</label>
    <input type="text" formControlName="description"
      class="w-full h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 text-sm" />
  </div>

  @if (error()) {
    <p class="text-xs text-rose-600 bg-rose-50 dark:bg-rose-950/40 rounded-lg px-3 py-2">{{ error() }}</p>
  }

  <div class="flex gap-2">
    <button type="submit" [disabled]="saving() || overBalance()"
      class="flex-1 h-11 rounded-xl bg-primary-600 text-white text-sm font-medium hover:bg-primary-700 disabled:opacity-60">
      {{ saving() ? 'Guardando...' : 'Guardar' }}
    </button>
    <a routerLink="/transactions"
      class="h-11 px-5 grid place-items-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm">Cancelar</a>
  </div>
</form>
