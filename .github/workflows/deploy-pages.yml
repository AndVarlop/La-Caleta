name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (production)
        run: npm run build -- --configuration production --base-href "/La-Caleta/"

      - name: Prepare SPA files
        shell: bash
        run: |
          if [ -d "dist/la-caleta/browser" ]; then
            APP_DIR="dist/la-caleta/browser"
          else
            APP_DIR="dist/la-caleta"
          fi
          touch "$APP_DIR/.nojekyll"
          cp "$APP_DIR/index.html" "$APP_DIR/404.html"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.APP_DIR }}
          branch: gh-pages
