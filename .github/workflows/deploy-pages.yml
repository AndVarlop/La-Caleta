name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (production)
        run: npm run build -- --configuration production --base-href "/La-Caleta/"

      - name: Prepare SPA entry files
        shell: bash
        run: |
          if [ -d "dist/la-caleta/browser" ]; then
            APP_DIR="dist/la-caleta/browser"
          else
            APP_DIR="dist/la-caleta"
          fi

          touch "$APP_DIR/.nojekyll"

          if [ -f "$APP_DIR/index.csr.html" ]; then
            cp "$APP_DIR/index.csr.html" "$APP_DIR/index.html"
          fi

          cp "$APP_DIR/index.html" "$APP_DIR/404.html"

          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
